
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>InsightScan Admin | Local Biometrics</title>
    <script>
      (function () {
        try {
          var savedTheme = localStorage.getItem('insight_theme');
          var theme = savedTheme === 'light' || savedTheme === 'dark' ? savedTheme : 'dark';
          var isDark = theme === 'dark';
          document.documentElement.classList.toggle('dark', isDark);
        } catch (e) {
          document.documentElement.classList.add('dark');
        }
      })();
    </script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = { darkMode: 'class' };
    </script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- face-api.js for local browser-based face recognition -->
    <script defer src="https://cdn.jsdelivr.net/npm/@vladmandic/face-api/dist/face-api.min.js"></script>
<script type="importmap">
{

}
</script>

</head>

</body>
</html>
